# Quorum — Cloudflare Pages + Workers config
# Domain: quorum.malamaconsulting.com

name = "quorum"
compatibility_date = "2025-03-16"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "quorum-db"
database_id = "01e6a6b4-6b15-4fb1-8474-2c4dd53dc60a"
migrations_dir = "db/d1-migrations"

# R2 bucket for event cover images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "quorum-images"

[vars]
# Comma-separated Google email addresses allowed to sign in.
# Leave empty to allow any authenticated Google user.
ALLOWED_EMAILS = ""

# Secrets (set via `wrangler pages secret put <KEY>` or the CF dashboard):
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   RESEND_API_KEY
