# Quorum — Cloudflare Pages + Workers config
# Domain: quorum.malamaconsulting.com

name = "quorum"
compatibility_date = "2025-03-16"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

# R2 bucket for event cover images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "quorum-images"

# Outbound email via Cloudflare Email Routing
# Requires Email Routing enabled on the domain + a verified sender address.
# Configure in CF dashboard: Email > Email Routing > Send email workers
[[send_email]]
name = "EMAIL"

# Secrets (set via `wrangler pages secret put <KEY>` or the CF dashboard):
#   DATABASE_URL
#   WORKOS_API_KEY
#   WORKOS_CLIENT_ID
#   SESSION_SECRET
#   EMAIL_FROM   (e.g. noreply@quorum.malamaconsulting.com)
